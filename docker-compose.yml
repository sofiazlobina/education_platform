version: '3.8'

services:
  app:
    build: .
    ports:
      - "8001:8000"  # Твой ПК:8001 → Контейнер:8000
    environment:
      # Используем SQLite (файл внутри контейнера)
      - DATABASE_URL=sqlite:///./educational_platform.db
      #  - DATABASE_URL=postgresql://postgres:postgres@db:5432/educational_platform  # ← ИЗМЕНИЛИ
      - SECRET_KEY=super_secret_key_for_docker_123
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - APP_NAME=Educational Platform
      - APP_VERSION=1.0.0
      - DEBUG=False
#     depends_on:  # ← ДОБАВИЛИ (ждём, пока БД запустится)
#       db:
#         condition: service_healthy
#     restart: unless-stopped

#   db:  # ← ДОБАВИЛИ (сервис PostgreSQL)
#     image: postgres:15-alpine
#     environment:
#       - POSTGRES_USER=postgres
#       - POSTGRES_PASSWORD=postgres
#       - POSTGRES_DB=educational_platform
#     volumes:
#       - postgres_data:/var/lib/postgresql/data
#     healthcheck:
#       test: ["CMD-SHELL", "pg_isready -U postgres"]
#       interval: 10s
#       timeout: 5s
#       retries: 5

# volumes:
#   postgres_data:  # ← ДОБАВИЛИ (сохранение данных)

    volumes:
      # Сохраняем файл БД и код между перезапусками (опционально)
      - ./educational_platform.db:/app/educational_platform.db
    restart: unless-stopped