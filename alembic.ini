[alembic]
# путь к папке с миграциями
script_location = alembic

# шаблон для имён файлов миграций
file_template = %%(rev)s_%%(slug)s

# разделитель путей
version_path_separator = os

# URL подключения к базе данных (SQLite для локальной разработки)
sqlalchemy.url = sqlite:///./educational_platform.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S